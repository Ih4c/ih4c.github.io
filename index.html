<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nate_Sec | Terminal</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="terminal">
    <!-- Hacking Animation -->
    <div class="hack-animation">
      <div class="scanline"></div>
      <div class="glitch-text">root@nate_sec:~# <span id="hack-code"></span><span class="cursor">|</span></div>
    </div>

    <!-- Terminal Output -->
    <div class="output">
      <p class="glow">Welcome to Nate_Sec's cybersecurity portfolio.</p>
      <p>Type <strong>"help"</strong> for commands or <strong>"start"</strong> for demo.</p>
      <div id="matrix-effect"></div>
    </div>

    <!-- Input Area -->
    <div class="input-area">
      <span>user@nate_sec:~$ </span>
      <input type="text" id="command-input" autofocus>
    </div>
  </div>
  <script src="js/script.js"></script>
</body>
</html>
